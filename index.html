<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ops Nexus Proxy — Enterprise Control Center</title>
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <style>
        /* Essentialist Dark Mode Ecosystem */
        :root {
            --bg-primary: #212121;
            --bg-secondary: #171717;
            --bg-tertiary: #2f2f2f;
            --accent: #10b981; /* Emerald 500 */
            --text-main: #ececec;
            --text-muted: #a1a1aa;
        }
        
        body { background-color: var(--bg-primary); color: var(--text-main); }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Code Highlighting & Typography */
        .code-highlight { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
        pre code { white-space: pre-wrap; word-break: break-word; }
        
        /* Animations */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fadeIn { animation: fadeIn 0.3s ease-out forwards; }
        
        /* Custom Scrollbar for Main Chat */
        #chat-container::-webkit-scrollbar { width: 6px; }
        #chat-container::-webkit-scrollbar-track { background: transparent; }
        #chat-container::-webkit-scrollbar-thumb { background: #424242; border-radius: 3px; }
        #chat-container::-webkit-scrollbar-thumb:hover { background: #525252; }
    </style>
</head>
<body class="h-screen flex font-sans overflow-hidden select-none antialiased">

    <!-- TOAST NOTIFICATION ENGINE -->
    <div id="toast-container" class="fixed top-4 right-4 z-[100] space-y-2 pointer-events-none w-80"></div>

    <!-- SIDEBAR: CONTROL PLANE -->
    <aside class="w-[320px] bg-[#171717] h-full flex flex-col justify-between p-3 hidden md:flex border-r border-[#2f2f2f] shrink-0 z-20 transition-all duration-300">
        <div class="flex flex-col h-full overflow-hidden">
            
            <!-- New Session Action -->
            <button id="new-chat-btn" class="w-full flex items-center justify-between px-3 py-2.5 rounded-lg text-sm font-medium hover:bg-[#212121] transition border border-[#424242] cursor-pointer shrink-0 shadow-sm group">
                <span class="flex items-center gap-2 text-gray-300 group-hover:text-white">
                    <svg class="w-4 h-4 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                    <span data-i18n="new_workspace">New Workspace</span>
                </span>
                <kbd class="text-[10px] bg-[#2f2f2f] px-1.5 py-0.5 rounded border border-gray-600 text-gray-400">Ctrl+N</kbd>
            </button>

            <!-- Core Configuration Matrix -->
            <div class="mt-4 shrink-0 bg-[#212121] p-3 rounded-xl border border-[#2f2f2f] space-y-3">
                <!-- Language Selector -->
                <div>
                    <label class="text-[10px] font-bold text-gray-500 block mb-1 tracking-wider uppercase" data-i18n="ui_language">Interface Language</label>
                    <select id="lang-select" class="w-full bg-[#171717] text-xs text-[#ececec] border border-[#424242] rounded-lg px-2 py-2 focus:outline-none focus:border-emerald-500 cursor-pointer">
                        <option value="en">English (US)</option>
                        <option value="es">Español</option>
                        <option value="ca">Català</option>
                        <option value="pt">Português</option>
                        <option value="de">Deutsch</option>
                        <option value="fr">Français</option>
                    </select>
                </div>

                <!-- Model Router -->
                <div>
                    <label class="text-[10px] font-bold text-gray-500 block mb-1 tracking-wider uppercase" data-i18n="core_orchestrator">Core Orchestrator</label>
                    <select id="engine-select" class="w-full bg-[#171717] text-xs text-[#ececec] border border-[#424242] rounded-lg px-2 py-2 focus:outline-none focus:border-emerald-500 cursor-pointer">

                        <option value="claude">Claude 3.5 Sonnet (Direct API)</option>
                        <option value="openai">OpenAI GPT-4o (Direct API)</option>
                    </select>
                </div>

                <!-- System Prompt Preset -->
                <div>
                    <label class="text-[10px] font-bold text-gray-500 block mb-1 tracking-wider uppercase" data-i18n="behavior_filter">Behavior Filter</label>
                    <select id="prompt-preset" class="w-full bg-[#171717] text-xs text-[#ececec] border border-[#424242] rounded-lg px-2 py-2 focus:outline-none focus:border-emerald-500 cursor-pointer">
                        <option value="sysadmin">SysAdmin / DevOps Architect</option>
                        <option value="sec">Security Auditor / Forensics</option>
                        <option value="doc">Technical Documentation Writer</option>
                    </select>
                </div>

                <!-- Stream Translation Toggle -->
                <div class="flex items-center justify-between pt-1">
                    <span class="text-[10px] font-bold text-gray-500 uppercase tracking-wider" data-i18n="auto_translate">Auto-Translate Stream</span>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="auto-translate-toggle" class="sr-only peer">
                        <div class="w-9 h-5 bg-[#2f2f2f] peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-emerald-600"></div>
                    </label>
                </div>
            </div>

            <!-- Expandable Integration Modules -->
            <div class="mt-4 space-y-1 overflow-y-auto no-scrollbar flex-1 pr-1">
                
                <!-- Credentials: Anthropic -->

                    </button>

                        <input type="password" id="claude-key" placeholder="sk-ant-..." class="w-full bg-[#171717] border border-[#424242] rounded p-2 text-xs focus:outline-none focus:border-emerald-500 font-mono">
                    </div>
                </div>

                    </div>
                </div>

                <!-- Jira Workspace Integration -->
                <div class="border border-[#2f2f2f] rounded-lg bg-[#212121] overflow-hidden mt-2">
                    <button class="w-full px-3 py-2 text-left text-xs font-bold text-gray-400 bg-[#1a1a1a] flex justify-between items-center hover:text-white transition" onclick="toggleSection('jira-inputs')">

                <span data-i18n="shortcuts_info">Shortcuts: Enter to Send // Ctrl+N to Clear</span>
                <span>E2E Client-Side Encryption Active</span>
            </div>
        </footer>
    </div>

        };

        const SYSTEM_PRESETS = {
            sysadmin: "You are Ops Nexus AI. A Senior DevOps Architect and Linux/Windows SysAdmin. Generate exclusively clean, modular, robust scripts and production-ready commands. Omit polite introductions or generic explanations.",
            sec: "You are an IT Security Auditor and Systems Forensics Analyst. Analyze logs, network traces, and smart contracts for vulnerabilities, memory leaks, or exploits. Return cold, technical, and mathematical executive summaries.",
            doc: "You are a Technical Infrastructure Writer. Transform technical specs, console outputs, or raw JSON into structured technical documentation following corporate Markdown standards."
        };

        // --- STATE MANAGEMENT ---
        let chatHistory = [];
        let indexedDatabase = null;
        let currentSessionId = null;
        let currentLang = 'en';

        // DOM Elements Cache
        const els = {
            chatContainer: document.getElementById('chat-container'),
            chatForm: document.getElementById('chat-form'),
            userInput: document.getElementById('user-input'),
            sendBtn: document.getElementById('send-btn'),
            engineSelect: document.getElementById('engine-select'),
            promptPreset: document.getElementById('prompt-preset'),
            activeEngineBadge: document.getElementById('active-engine-badge'),
            dbHistoryList: document.getElementById('db-history-list'),
            langSelect: document.getElementById('lang-select'),
            autoTranslateToggle: document.getElementById('auto-translate-toggle')
        };

        // --- INITIALIZATION ---
        document.addEventListener('DOMContentLoaded', async () => {
            currentSessionId = 'session_' + Date.now();
            await initLocalDatabase();
            loadSavedConfig();
            applyLanguage(currentLang);
            showInitialCanvas();
            setupGlobalHotkeys();
        });

        // --- LOCALIZATION ENGINE ---
        function applyLanguage(lang) {
            currentLang = lang;
            const dict = I18N[lang] || I18N.en;
            
            // Update static elements
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (dict[key]) el.textContent = dict[key];
            });

            // Update dynamic placeholders
            els.userInput.placeholder = dict.placeholder_input || "Enter command...";
            
            // Persist preference
            localStorage.setItem('nexus_pref_lang', lang);
        }

        els.langSelect.addEventListener('change', (e) => applyLanguage(e.target.value));

        // --- INDEXEDDB PERSISTENCE LAYER ---
        function initLocalDatabase() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains('sessions')) {
                        db.createObjectStore('sessions', { keyPath: 'id' });
                    }
                    if (!db.objectStoreNames.contains('config')) {
                        db.createObjectStore('config', { keyPath: 'key' });
                    }
                };
                request.onsuccess = (e) => {
                    indexedDatabase = e.target.result;
                    refreshHistoryFromDB();
                    resolve();
                };
                request.onerror = () => reject("IndexedDB initialization failed");
            });
        }

        function saveCurrentSessionToDB() {
            if (!indexedDatabase || chatHistory.length === 0) return;
            const transaction = indexedDatabase.transaction(['sessions'], 'readwrite');
            const store = transaction.objectStore('sessions');
            const userMessages = chatHistory.filter(m => m.role === 'user');
            const previewText = userMessages.length > 0 ? userMessages[0].content.substring(0, 30) + '...' : 'Empty technical session';
            
            store.put({
                id: currentSessionId,
                preview: previewText,
                history: chatHistory,
                timestamp: Date.now()
            });
            transaction.oncomplete = () => refreshHistoryFromDB();
        }

        function refreshHistoryFromDB() {
            if (!indexedDatabase) return;
            const store = indexedDatabase.transaction(['sessions'], 'readonly').objectStore('sessions');
            els.dbHistoryList.innerHTML = '';
            
            store.openCursor(null, 'prev').onsuccess = (e) => {
                const cursor = e.target.result;
                if (cursor) {
                    const data = cursor.value;
                    const block = document.createElement('div');
                    block.className = 'group flex items-center justify-between px-3 py-2 rounded-lg text-gray-400 hover:bg-[#212121] hover:text-white cursor-pointer truncate transition-all text-xs';
                    block.innerHTML = `
                        <span class="truncate flex items-center gap-2" onclick="loadSession('${data.id}')">📁 ${escapeHtml(data.preview)}</span>
                        <span onclick="deleteSession('${data.id}')" class="opacity-0 group-hover:opacity-100 text-gray-500 hover:text-red-400 font-bold px-1">✕</span>
                    `;
                    els.dbHistoryList.appendChild(block);
                    cursor.continue();
                }
            };
        }

        window.loadSession = function(id) {
            const store = indexedDatabase.transaction(['sessions'], 'readonly').objectStore('sessions');
            store.get(id).onsuccess = (e) => {
                const data = e.target.result;
                if(data) {
                    currentSessionId = data.id;
                    chatHistory = data.history;
                    els.chatContainer.innerHTML = '';
                    chatHistory.forEach(m => {
                        if(m.role !== 'system') displayMessage(m.role, m.content);
                    });
                    createToast(I18N[currentLang].toast_session_restored, 'success');
                }
            };
        };

        window.deleteSession = function(id) {
            const transaction = indexedDatabase.transaction(['sessions'], 'readwrite');
            transaction.objectStore('sessions').delete(id);
            transaction.oncomplete = () => {
                if(currentSessionId === id) clearCurrentCanvas();
                createToast(I18N[currentLang].toast_session_deleted, 'info');
                refreshHistoryFromDB();
            };
        };

        // --- UI RENDERING & MARKDOWN PARSER ---
        function showInitialCanvas() {
            const t = I18N[currentLang];
            els.chatContainer.innerHTML = `
                <div id="welcome-screen" class="h-full flex flex-col items-center justify-center text-center pt-32 select-none animate-fadeIn">
                    <div class="w-14 h-14 rounded-2xl bg-[#2f2f2f] border border-[#424242] flex items-center justify-center text-2xl shadow-xl text-emerald-400 font-mono font-bold mb-5">⚡</div>
                    <h2 class="text-2xl font-medium text-[#ececec] tracking-wide">${t.welcome_title}</h2>
                    <p class="text-xs text-gray-500 mt-2 font-mono max-w-md">${t.welcome_desc}</p>
                </div>`;
        }

        function formatMarkdown(text) {
            const codeBlockRegex = /```([a-zA-Z0-9_-]*)\n([\s\S]*?)```/g;
            return text.replace(codeBlockRegex, (match, lang, code) => {
                const codeId = 'code_' + Math.random().toString(36).substring(2, 9);
                const cleanCode = code.trim();
                return `
                    <div class="bg-[#1a1a1a] border border-[#2f2f2f] rounded-xl my-4 font-mono text-xs text-emerald-400 overflow-hidden shadow-lg">
                        <div class="bg-[#111] px-4 py-2 flex justify-between items-center border-b border-[#2f2f2f] text-[10px] text-gray-500 font-bold tracking-wider select-none">
                            <span>${lang.toUpperCase() || 'SCRIPT / OUTPUT'}</span>
                            <div class="flex gap-3">
                                <button onclick="copyToClipboard('${codeId}')" class="hover:text-white transition cursor-pointer">COPY</button>
                                <button onclick="downloadCodeBlock('${codeId}', '${lang || 'txt'}')" class="hover:text-white transition cursor-pointer text-emerald-500">DOWNLOAD</button>
                            </div>
                        </div>
                        <pre class="p-4 overflow-x-auto text-[13px] leading-relaxed"><code id="${codeId}">${escapeHtml(cleanCode)}</code></pre>
                    </div>`;
            });
        }

        function displayMessage(role, text) {
            const welcome = document.getElementById('welcome-screen');
            if (welcome) welcome.remove();

            const row = document.createElement('div');
            row.className = `w-full flex gap-4 py-4 animate-fadeIn ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            
            if (role === 'user') {
                row.innerHTML = `<div class="max-w-[75%] bg-[#2f2f2f] text-[#ececec] px-4 py-2.5 rounded-2xl text-[14px] leading-relaxed select-text shadow-sm border border-[#3c3c3c]">${escapeHtml(text)}</div>`;
            } else {
                row.innerHTML = `
                    <div class="w-7 h-7 rounded-lg bg-emerald-600 flex items-center justify-center text-xs font-bold text-white shrink-0 shadow-md">O</div>
                    <div class="flex-1 text-[#ececec] text-[14px] leading-relaxed tracking-wide select-text prose prose-invert max-w-none">${formatMarkdown(text)}</div>`;
            }
            els.chatContainer.appendChild(row);
            els.chatContainer.scrollTop = els.chatContainer.scrollHeight;
        }

        // --- INTEGRATIONS: JIRA & DEEPL ---
        async function extractExternalJiraContext() {
            const domain = document.getElementById('jira-domain').value.trim();
            const email = document.getElementById('jira-email').value.trim();
            const token = document.getElementById('jira-token').value.trim();
            const issueId = document.getElementById('jira-issue').value.trim();
            const syncEnabled = document.getElementById('jira-sync-toggle').checked;

            if (!syncEnabled || !domain || !email || !token || !issueId) return null;

            try {
                const proxy = 'https://cors-anywhere.herokuapp.com/';
                const targetUrl = `https://${domain}/rest/api/3/issue/${issueId}`;
                
                const response = await fetch(proxy + targetUrl, {
                    headers: {
                        "Authorization": `Basic ${b64EncodeUnicode(`${email}:${token}`)}`,
                        "Accept": "application/json",
                        "X-Requested-With": "XMLHttpRequest"
                    }
                });
                if (!response.ok) return null;
                const data = await response.json();
                return `[JIRA TICKET DATA - ID: ${issueId}]\nSummary: ${data.fields?.summary || 'N/A'}\nDescription: ${data.fields?.description?.content?.[0]?.content?.[0]?.text || 'N/A'}\nStatus: ${data.fields?.status?.name || 'N/A'}`;
            } catch (err) {
                console.error("Jira Fetch Error:", err);
                return null;
            }
        }

        async function translateViaDeepL(text, targetLang) {
            const key = document.getElementById('deepl-key').value.trim();
            if (!key) return text; // Fallback to original if no key

            // Map app lang codes to DeepL codes
            const langMap = { en: 'EN-US', es: 'ES', ca: 'ES', pt: 'PT-BR', de: 'DE', fr: 'FR' };
            const target = langMap[targetLang] || 'EN-US';

            try {
                const formData = new URLSearchParams();
                formData.append('auth_key', key);
                formData.append('text', text);
                formData.append('target_lang', target);

                const res = await fetch('https://api.deepl.com/v2/translate', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                return data.translations?.[0]?.text || text;
            } catch (e) {
                console.error("DeepL Error:", e);
                return text;
            }
        }

        // --- CORE PIPELINE & ROUTING ---
        els.chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = els.userInput.value.trim();
            if (!text) return;

            els.userInput.value = '';
            els.userInput.disabled = true;
            els.sendBtn.disabled = true;

            // Inject Jira Context if active
            const jiraContext = await extractExternalJiraContext();
            let finalPromptPayload = text;
            if(jiraContext) {
                finalPromptPayload = `${jiraContext}\n\n[REQUIRED TECHNICAL INSTRUCTION REGARDING THIS TICKET]:\n${text}`;
                createToast(I18N[currentLang].toast_jira_injected, 'info');
            }

            displayMessage('user', text);

            // Inject System Prompt if first message
            if (chatHistory.length === 0) {
                const currentPresetKey = els.promptPreset.value;
                chatHistory.push({ role: 'system', content: SYSTEM_PRESETS[currentPresetKey] });
            }

            chatHistory.push({ role: 'user', content: finalPromptPayload });

            // Loading Indicator
            const loadingRow = document.createElement('div');
            loadingRow.className = 'w-full flex gap-4 py-4 justify-start';
            loadingRow.innerHTML = `
                <div class="w-7 h-7 rounded-lg bg-emerald-600 flex items-center justify-center text-xs font-bold text-white shrink-0 shadow-md">O</div>
                <div class="text-xs text-gray-500 font-mono flex items-center gap-2"><svg class="animate-spin h-3 w-3 text-emerald-400" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4m2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"/></svg> ${I18N[currentLang].toast_processing}</div>`;
            els.chatContainer.appendChild(loadingRow);
            els.chatContainer.scrollTop = els.chatContainer.scrollHeight;

            const selectedEngine = els.engineSelect.value;
            let aiResponseText = "";

            try {
                if (selectedEngine === 'qwen') {
                    const response = await fetch(PROXY_WORKER_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ messages: chatHistory })
                    });
                    if(!response.ok) throw new Error("HTTP " + response.status);
                    const data = await response.json();
                    aiResponseText = data.choices?.[0]?.message?.content || 'Empty payload.';

                } else if (selectedEngine === 'claude') {
                    const key = document.getElementById('claude-key').value.trim();
                    if(!key) throw new Error(I18N[currentLang].error_claude_key);
                    
                    const response = await fetch('https://api.anthropic.com/v1/messages', {
                        method: 'POST',
                        headers: {
                            'x-api-key': key,
                            'anthropic-version': '2023-06-01',
                            'content-type': 'application/json',
                            'anthropic-dangerous-direct-browser-access': 'true'
                        },
                        body: JSON.stringify({
                            model: 'claude-3-5-sonnet-20241022',
                            max_tokens: 4096,
                            messages: chatHistory.filter(m => m.role !== 'system').map(m => ({ role: m.role, content: m.content })),
                            system: chatHistory.find(m => m.role === 'system')?.content || ""
                        })
                    });
                    const data = await response.json();
                    aiResponseText = data.content?.[0]?.text || 'Anthropic Cloud Error.';

                } else if (selectedEngine === 'openai') {
                    const key = document.getElementById('openai-key').value.trim();
                    if(!key) throw new Error(I18N[currentLang].error_openai_key);

                    const response = await fetch('https://api.openai.com/v1/chat/completions', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${key}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            model: 'gpt-4o',
                            messages: chatHistory
                        })
                    });
                    const data = await response.json();
                    aiResponseText = data.choices?.[0]?.message?.content || 'OpenAI Error.';
                }

                // Post-processing: Stream Translation if enabled
                if (els.autoTranslateToggle.checked && currentLang !== 'en') {
                    aiResponseText = await translateViaDeepL(aiResponseText, currentLang);
                }

                loadingRow.remove();
                displayMessage('assistant', aiResponseText);
                chatHistory.push({ role: 'assistant', content: aiResponseText });
                saveCurrentSessionToDB();

            } catch (error) {
                loadingRow.remove();
                displayMessage('assistant', `${I18N[currentLang].error_network} ${error.message}`);
            } finally {
                els.userInput.disabled = false;
                els.sendBtn.disabled = false;
                els.userInput.focus();
            }
        });

        // --- UTILITIES & HELPERS ---
        window.copyToClipboard = function(id) {
            const el = document.getElementById(id);
            navigator.clipboard.writeText(el.textContent);
            createToast(I18N[currentLang].toast_copied, 'success');
        };

        window.downloadCodeBlock = function(id, extension) {
            const code = document.getElementById(id).textContent;
            const blob = new Blob([code], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `nexus_script_${Date.now()}.${extension === 'python' ? 'py' : extension === 'javascript' ? 'js' : extension === 'bash' ? 'sh' : 'txt'}`;
            a.click();
            URL.revokeObjectURL(url);
            createToast(I18N[currentLang].toast_downloaded, 'success');
        };

        window.exportSessionData = function(format) {
            if (chatHistory.length === 0) return createToast(I18N[currentLang].toast_no_data, 'info');
            let content = "", filename = `nexus_export_${Date.now()}`;
            
            if (format === 'json') {
                content = JSON.stringify(chatHistory, null, 2);
                filename += '.json';
            } else {
                content = chatHistory.map(m => `## Role: ${m.role}\n\n${m.content}\n\n---\n`).join('\n');
                filename += '.md';
            }
            
            const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = filename;
            a.click();
        };

        window.clearCurrentCanvas = function() {
            chatHistory = [];
            currentSessionId = 'session_' + Date.now();
            els.chatContainer.innerHTML = '';
            showInitialCanvas();
            createToast(I18N[currentLang].toast_console_reset, 'info');
        };

        window.toggleSection = function(id) {
            document.getElementById(id).classList.toggle('hidden');
        };

        window.testJiraConnection = async function() {
            createToast(I18N[currentLang].jira_validating, 'info');
            const ctx = await extractExternalJiraContext();
            if(ctx) createToast(I18N[currentLang].jira_success, 'success');
            else createToast(I18N[currentLang].jira_fail, 'error');
        };

        function createToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `px-4 py-2.5 rounded-xl border shadow-2xl text-xs font-mono font-medium pointer-events-auto transition-all duration-300 transform translate-y-2 opacity-0 bg-[#1a1a1a] ${type === 'success' ? 'border-emerald-500 text-emerald-400' : type === 'info' ? 'border-blue-500 text-blue-400' : 'border-red-500 text-red-400'}`;
            toast.textContent = `[SYS LOG]: ${message}`;
            container.appendChild(toast);
            
            setTimeout(() => { toast.classList.remove('opacity-0', 'translate-y-2'); }, 50);
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-2');
                setTimeout(() => toast.remove(), 300);
            }, 3500);
        }

        function escapeHtml(text) {
            if(!text) return "";
            return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function b64EncodeUnicode(str) {
            return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, function(match, p1) {
                return String.fromCharCode('0x' + p1);
            }));
        }

        function setupGlobalHotkeys() {
            document.addEventListener('keydown', (e) => {
                if (e.ctrlKey && e.key.toLowerCase() === 'n') {
                    e.preventDefault();
                    clearCurrentCanvas();
                }
            });
        }

        function loadSavedConfig() {
            // Load preferences
            els.engineSelect.value = localStorage.getItem('nexus_pref_engine') || 'qwen';
            els.promptPreset.value = localStorage.getItem('nexus_pref_preset') || 'sysadmin';
            els.langSelect.value = localStorage.getItem('nexus_pref_lang') || 'en';
            
            // Trigger UI updates
            updateEngineUI();
            
            // Load sensitive fields from LocalStorage (User accepted risk via enterprise context)
            const fields = ['claude-key', 'openai-key', 'deepl-key', 'jira-domain', 'jira-email', 'jira-token', 'jira-issue'];
            fields.forEach(field => {
                const input = document.getElementById(field);
                if(input) {
                    input.value = localStorage.getItem(`nexus_${field}`) || '';
                    input.addEventListener('input', () => localStorage.setItem(`nexus_${field}`, input.value));
                }
            });
        }

        els.engineSelect.addEventListener('change', () => {
            localStorage.setItem('nexus_pref_engine', els.engineSelect.value);
            updateEngineUI();
        });

        function updateEngineUI() {
            const engine = els.engineSelect.value;
            let badgeText = "CORE STATUS: STABLE // MODEL: QWEN-32B";
            if(engine === 'claude') badgeText = "CORE STATUS: HYBRID // MODEL: CLAUDE-3.5";
            if(engine === 'openai') badgeText = "CORE STATUS: DIRECT // MODEL: GPT-4O";
            
            els.activeEngineBadge.textContent = badgeText;
            document.getElementById('claude-sec').style.display = engine === 'claude' ? 'block' : 'none';
            document.getElementById('openai-sec').style.display = engine === 'openai' ? 'block' : 'none';
        }

        els.promptPreset.addEventListener('change', () => {
            localStorage.setItem('nexus_pref_preset', els.promptPreset.value);
            clearCurrentCanvas();
        });

    </script>
</body>
