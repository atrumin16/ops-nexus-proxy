<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ops Nexus Proxy — Enterprise Control Center</title>
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .code-highlight { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    </style>
</head>
<body class="bg-[#212121] text-[#ececec] h-screen flex font-sans overflow-hidden select-none">

    <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2 pointer-events-none"></div>

    <aside class="w-[320px] bg-[#171717] h-full flex flex-col justify-between p-3 hidden md:flex border-r border-[#2f2f2f] shrink-0 z-20">
        <div class="flex flex-col h-full overflow-hidden">
            
            <button id="new-chat-btn" class="w-full flex items-center justify-between px-3 py-2.5 rounded-lg text-sm font-medium hover:bg-[#212121] transition border border-[#424242] cursor-pointer shrink-0 shadow-sm">
                <span class="flex items-center gap-2">
                    <svg class="w-4 h-4 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                    Nuevo Entorno de Trabajo
                </span>
                <kbd class="text-[10px] bg-[#2f2f2f] px-1.5 py-0.5 rounded border border-gray-600 text-gray-400">Ctrl + N</kbd>
            </button>

            <div class="mt-4 shrink-0 bg-[#212121] p-3 rounded-xl border border-[#2f2f2f] space-y-3">
                <div>
                    <label class="text-[10px] font-bold text-gray-500 block mb-1 tracking-wider uppercase">Orquestador Base</label>
                    <select id="engine-select" class="w-full bg-[#171717] text-xs text-[#ececec] border border-[#424242] rounded-lg px-2 py-2 focus:outline-none focus:border-emerald-500 cursor-pointer">
                        <option value="qwen">Qwen 32B Core (Default Proxy)</option>
                        <option value="claude">Claude 3.5 Sonnet (Direct API)</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-500 block mb-1 tracking-wider uppercase">Filtro de Comportamiento (System Prompt)</label>
                    <select id="prompt-preset" class="w-full bg-[#171717] text-xs text-[#ececec] border border-[#424242] rounded-lg px-2 py-2 focus:outline-none focus:border-emerald-500 cursor-pointer">
                        <option value="sysadmin">Perfil: SysAdmin / Devops Avanzado</option>
                        <option value="sec">Perfil: Auditor de Seguridad / Blockchain Forensics</option>
                        <option value="doc">Perfil: Redactor de Documentación Técnica</option>
                    </select>
                </div>
            </div>

            <div class="mt-4 space-y-1 overflow-y-auto no-scrollbar flex-1 pr-1">
                
                <div id="claude-sec" class="hidden border border-[#2f2f2f] rounded-lg bg-[#212121] overflow-hidden transition-all duration-200">
                    <button class="w-full px-3 py-2 text-left text-xs font-bold text-gray-400 bg-[#1a1a1a] flex justify-between items-center" onclick="toggleSection('claude-inputs')">
                        <span>🔑 CREDENCIALES ANTHROPIC</span>
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                    </button>
                    <div id="claude-inputs" class="p-3 space-y-2">
                        <input type="password" id="claude-key" placeholder="sk-ant-..." class="w-full bg-[#171717] border border-[#424242] rounded p-2 text-xs focus:outline-none focus:border-emerald-500 font-mono">
                    </div>
                </div>

                <div class="border border-[#2f2f2f] rounded-lg bg-[#212121] overflow-hidden">
                    <button class="w-full px-3 py-2 text-left text-xs font-bold text-gray-400 bg-[#1a1a1a] flex justify-between items-center" onclick="toggleSection('jira-inputs')">
                        <span>👔 JIRA WORKSPACE INTEGRATION</span>
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
                    </button>
                    <div id="jira-inputs" class="p-3 space-y-2 hidden">
                        <input type="text" id="jira-domain" placeholder="instancia.atlassian.net" class="w-full bg-[#171717] border border-[#424242] rounded p-2 text-xs focus:outline-none">
                        <input type="text" id="jira-email" placeholder="usuario@empresa.com" class="w-full bg-[#171717] border border-[#424242] rounded p-2 text-xs focus:outline-none">
                        <input type="password" id="jira-token" placeholder="Atlassian API Token" class="w-full bg-[#171717] border border-[#424242] rounded p-2 text-xs focus:outline-none font-mono">
                        <input type="text" id="jira-issue" placeholder="ID Ticket (ej: OPS-404)" class="w-full bg-[#171717] border border-[#424242] rounded p-2 text-xs focus:outline-none font-mono">
                        <button type="button" onclick="testJiraConnection()" class="w-full bg-[#2f2f2f] hover:bg-[#383838] border border-[#424242] py-1 text-[11px] rounded transition font-medium cursor-pointer">Validar Enlace</button>
                    </div>
                </div>

                <div class="pt-4">
                    <span class="text-[10px] font-bold text-gray-500 block px-3 mb-2 tracking-wider uppercase">Historial Persistente (LocalDB)</span>
                    <div id="db-history-list" class="space-y-1"></div>
                </div>
            </div>
        </div>

        <div class="border-t border-[#2f2f2f] pt-3 space-y-2 shrink-0">
            <div class="grid grid-cols-2 gap-2">
                <button onclick="exportSessionData('md')" class="text-center bg-[#212121] hover:bg-[#2f2f2f] border border-[#424242] text-[11px] py-1.5 rounded font-medium cursor-pointer transition flex items-center justify-center gap-1">
                    💾 Exportar MD
                </button>
                <button onclick="exportSessionData('json')" class="text-center bg-[#212121] hover:bg-[#2f2f2f] border border-[#424242] text-[11px] py-1.5 rounded font-medium cursor-pointer transition flex items-center justify-center gap-1">
                    📦 Exportar JSON
                </button>
            </div>
            <div class="flex items-center gap-3 px-3 py-2 rounded-xl bg-[#212121] border border-[#2f2f2f]">
                <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-emerald-600 to-teal-500 flex items-center justify-center text-xs font-bold text-white shadow-sm">OPS</div>
                <div class="truncate">
                    <p class="text-xs font-semibold text-gray-200">Ops Nexus System</p>
                    <p class="text-[10px] text-gray-500 font-mono">v2.1.0-Stable</p>
                </div>
            </div>
        </div>
    </aside>

    <div class="flex-1 flex flex-col justify-between h-full relative bg-[#212121]">
        
        <header class="w-full h-14 border-b border-[#2f2f2f] flex items-center justify-between px-6 bg-[#212121] shrink-0 z-10 shadow-sm">
            <div class="flex items-center gap-3">
                <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                <span id="active-engine-badge" class="text-xs font-mono font-medium text-gray-300">CORE STATUS: STABLE // MODEL: QWEN-32B</span>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="clearCurrentCanvas()" class="p-1.5 rounded-lg text-gray-400 hover:bg-[#2f2f2f] hover:text-white transition cursor-pointer" title="Limpiar Consola Actual">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                </button>
            </div>
        </header>

        <main id="chat-container" class="flex-1 overflow-y-auto no-scrollbar py-6 space-y-6 w-full max-w-3xl mx-auto px-4 md:px-0 scroll-smooth"></main>

        <footer class="w-full max-w-3xl mx-auto px-4 pb-6 bg-gradient-to-t from-[#212121] via-[#212121] to-transparent shrink-0">
            <form id="chat-form" class="relative flex items-center bg-[#2f2f2f] rounded-2xl border border-[#424242] focus-within:border-[#565656] shadow-2xl px-4 py-3.5 transition-all">
                <input type="text" id="user-input" placeholder="Introduce logs, scripts o comandos para procesar..." autocomplete="off" required
                    class="w-full bg-transparent text-[#ececec] text-[14px] focus:outline-none pr-14 placeholder-gray-500 tracking-wide font-normal">
                
                <div class="absolute right-3 flex items-center gap-1.5">
                    <button type="submit" id="send-btn" class="bg-[#ececec] hover:bg-white text-[#212121] rounded-xl p-2 transition-all cursor-pointer disabled:opacity-20 shadow-md">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 10.5 12 3m0 0 7.5 7.5M12 3v18" /></svg>
                    </button>
                </div>
            </form>
            <div class="flex justify-between items-center px-2 mt-2 text-[10px] text-gray-500 font-mono">
                <span>Atajos: Enter para enviar // Ctrl + N para limpiar entorno</span>
                <span>Cifrado Local Activo (E2E Client Data)</span>
            </div>
        </footer>
    </div>

    <script>
        const PROXY_WORKER_URL = 'https://proud-breeze-0411.atrumin16.workers.dev/';
        
        // Elementos del DOM global
        const chatContainer = document.getElementById('chat-container');
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const engineSelect = document.getElementById('engine-select');
        const promptPreset = document.getElementById('prompt-preset');
        const activeEngineBadge = document.getElementById('active-engine-badge');
        const dbHistoryList = document.getElementById('db-history-list');

        let chatHistory = [];
        let indexedDatabase = null;
        let currentSessionId = null;

        // SYSTEM PROMPT PRESETS DEFINITIVOS
        const SYSTEM_PRESETS = {
            sysadmin: "Eres Ops Nexus AI. Un Arquitecto DevOps y Administrador de Sistemas Linux/Windows Senior. Genera exclusivamente scripts limpios, modulares, robustos y comandos listos para producción. Omita introducciones corteses o explicaciones genéricas.",
            sec: "Eres un Auditor de Seguridad Informática y Analista Forense de Sistemas. Analiza logs, trazas de red y contratos inteligentes en busca de vulnerabilidades, fugas de memoria o exploits. Devuelve resúmenes ejecutivos fríos, técnicos y matemáticos.",
            doc: "Eres un Redactor Técnico de Infraestructura. Transforma especificaciones técnicas, salidas de consola o JSON crudos en documentación técnica estructurada bajo el estándar Markdown corporativo."
        };

        // INITIALIZATION ROUTINE (IndexedDB + Event Listeners)
        document.addEventListener('DOMContentLoaded', async () => {
            currentSessionId = 'session_' + Date.now();
            await initLocalDatabase();
            loadSavedConfig();
            showInitialCanvas();
            setupGlobalHotkeys();
        });

        // INDEXEDDB ENGINE (Arquitectura de almacenamiento local persistente)
        function initLocalDatabase() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open('OpsNexusStorage', 1);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains('sessions')) {
                        db.objectStoreStore.createStore = db.createObjectStore('sessions', { keyPath: 'id' });
                    }
                };
                request.onsuccess = (e) => {
                    indexedDatabase = e.target.result;
                    refreshHistoryFromDB();
                    resolve();
                };
                request.onerror = () => reject();
            });
        }

        function saveCurrentSessionToDB() {
            if (!indexedDatabase || chatHistory.length === 0) return;
            const transaction = indexedDatabase.transaction(['sessions'], 'readwrite');
            const store = transaction.objectStore('sessions');
            const userMessages = chatHistory.filter(m => m.role === 'user');
            const previewText = userMessages.length > 0 ? userMessages[0].content.substring(0, 30) + '...' : 'Sesión técnica vacía';
            
            store.put({
                id: currentSessionId,
                preview: previewText,
                history: chatHistory,
                timestamp: Date.now()
            });
            transaction.oncomplete = () => refreshHistoryFromDB();
        }

        function refreshHistoryFromDB() {
            if (!indexedDatabase) return;
            const store = indexedDatabase.transaction(['sessions'], 'readonly').objectStore('sessions');
            dbHistoryList.innerHTML = '';
            
            store.openCursor(null, 'prev').onsuccess = (e) => {
                const cursor = e.target.result;
                if (cursor) {
                    const data = cursor.value;
                    const block = document.createElement('div');
                    block.className = 'group flex items-center justify-between px-3 py-2 rounded-lg text-gray-400 hover:bg-[#212121] hover:text-white cursor-pointer truncate transition-all text-xs';
                    block.innerHTML = `
                        <span class="truncate flex items-center gap-2" onclick="loadSession('${data.id}')">📁 ${escapeHtml(data.preview)}</span>
                        <span onclick="deleteSession('${data.id}')" class="opacity-0 group-hover:opacity-100 text-gray-500 hover:text-red-400 font-bold px-1">✕</span>
                    `;
                    dbHistoryList.appendChild(block);
                    cursor.continue();
                }
            };
        }

        window.loadSession = function(id) {
            const store = indexedDatabase.transaction(['sessions'], 'readonly').objectStore('sessions');
            store.get(id).onsuccess = (e) => {
                const data = e.target.result;
                if(data) {
                    currentSessionId = data.id;
                    chatHistory = data.history;
                    chatContainer.innerHTML = '';
                    chatHistory.forEach(m => {
                        if(m.role !== 'system') displayMessage(m.role, m.content);
                    });
                    createToast('Sesión restaurada correctamente', 'success');
                }
            };
        };

        window.deleteSession = function(id) {
            const transaction = indexedDatabase.transaction(['sessions'], 'readwrite');
            transaction.objectStore('sessions').delete(id);
            transaction.oncomplete = () => {
                if(currentSessionId === id) clearCurrentCanvas();
                createToast('Sesión eliminada de la base de datos', 'info');
                refreshHistoryFromDB();
            };
        };

        // INTERFACE RENDERING & LOGIC
        function showInitialCanvas() {
            chatContainer.innerHTML = `
                <div id="welcome-screen" class="h-full flex flex-col items-center justify-center text-center pt-32 select-none animate-fadeIn">
                    <div class="w-14 h-14 rounded-2xl bg-[#2f2f2f] border border-[#424242] flex items-center justify-center text-2xl shadow-xl text-emerald-400 font-mono font-bold mb-5">⚡</div>
                    <h2 class="text-2xl font-medium text-[#ececec] tracking-wide">Ops Nexus Architecture Active</h2>
                    <p class="text-xs text-gray-500 mt-2 font-mono max-w-md">Instancia de orquestación aislada. Generación determinista de documentación y scripts mediante modelos optimizados.</p>
                </div>`;
        }

        function formatMarkdown(text) {
            // Renderizador de código en bloque avanzado con inyección de funciones nativas de descarga
            const codeBlockRegex = /```([a-zA-Z0-9_-]*)\n([\s\S]*?)```/g;
            return text.replace(codeBlockRegex, (match, lang, code) => {
                const codeId = 'code_' + Math.random().toString(36).substring(2, 9);
                const cleanCode = code.trim();
                return `
                    <div class="bg-[#1a1a1a] border border-[#2f2f2f] rounded-xl my-4 font-mono text-xs text-emerald-400 overflow-hidden shadow-lg">
                        <div class="bg-[#111] px-4 py-2 flex justify-between items-center border-b border-[#2f2f2f] text-[10px] text-gray-500 font-bold tracking-wider select-none">
                            <span>${lang.toUpperCase() || 'SCRIPT / OUTPUT'}</span>
                            <div class="flex gap-3">
                                <button onclick="copyToClipboard('${codeId}')" class="hover:text-white transition cursor-pointer">COPIAR</button>
                                <button onclick="downloadCodeBlock('${codeId}', '${lang || 'txt'}')" class="hover:text-white transition cursor-pointer text-emerald-500">DESCARGAR SCRIPT</button>
                            </div>
                        </div>
                        <pre class="p-4 overflow-x-auto text-[13px] leading-relaxed"><code id="${codeId}">${escapeHtml(cleanCode)}</code></pre>
                    </div>`;
            });
        }

        function displayMessage(role, text) {
            const welcome = document.getElementById('welcome-screen');
            if (welcome) welcome.remove();

            const row = document.createElement('div');
            row.className = `w-full flex gap-4 py-4 animate-fadeIn ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            
            if (role === 'user') {
                row.innerHTML = `<div class="max-w-[75%] bg-[#2f2f2f] text-[#ececec] px-4 py-2.5 rounded-2xl text-[14px] leading-relaxed select-text shadow-sm border border-[#3c3c3c]">${escapeHtml(text)}</div>`;
            } else {
                row.innerHTML = `
                    <div class="w-7 h-7 rounded-lg bg-emerald-600 flex items-center justify-center text-xs font-bold text-white shrink-0 shadow-md">O</div>
                    <div class="flex-1 text-[#ececec] text-[14px] leading-relaxed tracking-wide select-text">${formatMarkdown(text)}</div>`;
            }
            chatContainer.appendChild(row);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // CONTROLADORES DE INTEGRACIÓN (JIRA REST INTEGRATION FRONTEND)
        async function extractExternalJiraContext() {
            const domain = document.getElementById('jira-domain').value.trim();
            const email = document.getElementById('jira-email').value.trim();
            const token = document.getElementById('jira-token').value.trim();
            const issueId = document.getElementById('jira-issue').value.trim();

            if (!domain || !email || !token || !issueId) return null;

            try {
                // Proxy CORS público intermedio para desarrollo seguro cliente-servidor directo
                const proxy = 'https://cors-anywhere.herokuapp.com/';
                const targetUrl = `https://${domain}/rest/api/3/issue/${issueId}`;
                
                const response = await fetch(proxy + targetUrl, {
                    headers: {
                        "Authorization": `Basic ${b64EncodeUnicode(`${email}:${token}`)}`,
                        "Accept": "application/json",
                        "X-Requested-With": "XMLHttpRequest"
                    }
                });
                if (!response.ok) return null;
                const data = await response.json();
                return `[DATOS TICKET JIRA CLOUD - ID: ${issueId}]\nResumen: ${data.fields?.summary || 'N/A'}\nDescripción: ${data.fields?.description?.content?.[0]?.content?.[0]?.text || 'N/A'}\nEstado: ${data.fields?.status?.name || 'N/A'}`;
            } catch (err) {
                console.error(err);
                return null;
            }
        }

        // PIPELINE DE ENVÍO Y PROCESAMIENTO CORE
        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = userInput.value.trim();
            if (!text) return;

            userInput.value = '';
            userInput.disabled = true;
            sendBtn.disabled = true;

            // Inyección automatizada de contexto Jira si los campos están completos en el Frontend
            const jiraContext = await extractExternalJiraContext();
            let finalPromptPayload = text;
            if(jiraContext) {
                finalPromptPayload = `${jiraContext}\n\n[INSTRUCCIÓN TÉCNICA REQUERIDA SOBRE ESTE TICKET]:\n${text}`;
                createToast('Contexto del ticket Jira inyectado al payload', 'info');
            }

            displayMessage('user', text);

            // Verificación e inyección del System Prompt Seleccionado
            if (chatHistory.length === 0) {
                const currentPresetKey = promptPreset.value;
                chatHistory.push({ role: 'system', content: SYSTEM_PRESETS[currentPresetKey] });
            }

            chatHistory.push({ role: 'user', content: finalPromptPayload });

            const loadingRow = document.createElement('div');
            loadingRow.className = 'w-full flex gap-4 py-4 justify-start';
            loadingRow.innerHTML = `
                <div class="w-7 h-7 rounded-lg bg-emerald-600 flex items-center justify-center text-xs font-bold text-white shrink-0 shadow-md">O</div>
                <div class="text-xs text-gray-500 font-mono flex items-center gap-2"><svg class="animate-spin h-3 w-3 text-emerald-400" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4m2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"/></svg> Procesando Pipeline...</div>`;
            chatContainer.appendChild(loadingRow);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            const selectedEngine = engineSelect.value;

            try {
                let aiResponseText = "";

                if (selectedEngine === 'qwen') {
                    // LLAMADA AL CLOUDFLARE WORKER DE PRODUCCIÓN (Groq API Protection)
                    const response = await fetch(PROXY_WORKER_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ messages: chatHistory })
                    });
                    
                    if(!response.ok) throw new Error("Error HTTP " + response.status);
                    const data = await response.json();
                    aiResponseText = data.choices?.[0]?.message?.content || 'Carga útil vacía.';
                } else {
                    // PROCESAMIENTO LOCAL CLIENTE A ANTHROPIC CLAUDE DIRECTO
                    const key = document.getElementById('claude-key').value.trim();
                    if(!key) {
                        aiResponseText = "ERROR CRÍTICO: Seleccionaste Claude pero la clave API de Anthropic está vacía en los ajustes laterales.";
                    } else {
                        const response = await fetch('https://api.anthropic.com/v1/messages', {
                            method: 'POST',
                            headers: {
                                'x-api-key': key,
                                'anthropic-version': '2023-06-01',
                                'content-type': 'application/json',
                                'dangerously-allow-browser': 'true'
                            },
                            body: JSON.stringify({
                                model: 'claude-3-5-sonnet-20241022',
                                max_tokens: 4096,
                                messages: chatHistory.filter(m => m.role !== 'system').map(m => ({ role: m.role, content: m.content })),
                                system: chatHistory.find(m => m.role === 'system')?.content || ""
                            })
                        });
                        const data = await response.json();
                        aiResponseText = data.content?.[0]?.text || 'Error en respuesta de Anthropic Cloud.';
                    }
                }

                loadingRow.remove();
                displayMessage('assistant', aiResponseText);
                chatHistory.push({ role: 'assistant', content: aiResponseText });
                saveCurrentSessionToDB();

            } catch (error) {
                loadingRow.remove();
                displayMessage('assistant', `Fallo de comunicación en el Nodo: ${error.message}. Verifica que el Worker de Cloudflare esté online.`);
            } finally {
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
            }
        });

        // UTILIDADES AVANZADAS DE CONTROL (Sistemas y Descargas de Datos)
        window.copyToClipboard = function(id) {
            const el = document.getElementById(id);
            navigator.clipboard.writeText(el.textContent);
            createToast('Código copiado al portapapeles', 'success');
        };

        window.downloadCodeBlock = function(id, extension) {
            const code = document.getElementById(id).textContent;
            const blob = new Blob([code], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `script_nexus_${Date.now()}.${extension === 'python' ? 'py' : extension === 'javascript' ? 'js' : extension === 'bash' ? 'sh' : 'txt'}`;
            a.click();
            URL.revokeObjectURL(url);
            createToast('Script descargado de forma segura', 'success');
        };

        window.exportSessionData = function(format) {
            if (chatHistory.length === 0) return createToast('No hay datos en la sesión actual', 'info');
            let content = "", filename = `nexus_export_${Date.now()}`;
            
            if (format === 'json') {
                content = JSON.stringify(chatHistory, null, 2);
                filename += '.json';
            } else {
                content = chatHistory.map(m => `## Role: ${m.role}\n\n${m.content}\n\n---\n`).join('\n');
                filename += '.md';
            }
            
            const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = filename;
            a.click();
        };

        window.clearCurrentCanvas = function() {
            chatHistory = [];
            currentSessionId = 'session_' + Date.now();
            chatContainer.innerHTML = '';
            showInitialCanvas();
            createToast('Consola de trabajo restablecida', 'info');
        };

        // EVENTOS DE LA CONFIGURACIÓN Y PERSISTENCIA GLOBAL DEL FRONT
        engineSelect.addEventListener('change', () => {
            const engine = engineSelect.value;
            activeEngineBadge.textContent = engine === 'qwen' ? 'CORE STATUS: STABLE // MODEL: QWEN-32B' : 'CORE STATUS: HYBRID // MODEL: CLAUDE-3.5';
            document.getElementById('claude-sec').style.display = engine === 'claude' ? 'block' : 'none';
            localStorage.setItem('nexus_pref_engine', engine);
        });

        promptPreset.addEventListener('change', () => {
            localStorage.setItem('nexus_pref_preset', promptPreset.value);
            clearCurrentCanvas();
        });

        window.toggleSection = function(id) {
            const el = document.getElementById(id);
            el.classList.toggle('hidden');
        };

        function loadSavedConfig() {
            engineSelect.value = localStorage.getItem('nexus_pref_engine') || 'qwen';
            promptPreset.value = localStorage.getItem('nexus_pref_preset') || 'sysadmin';
            engineSelect.dispatchEvent(new Event('change'));
            
            fields.forEach(field => {
                const input = document.getElementById(field);
                input.value = localStorage.getItem(`nexus_${field}`) || '';
                input.addEventListener('input', () => localStorage.setItem(`nexus_${field}`, input.value));
            });
        }

        function setupGlobalHotkeys() {
            document.addEventListener('keydown', (e) => {
                if (e.ctrlKey && e.key.toLowerCase() === 'n') {
                    e.preventDefault();
                    clearCurrentCanvas();
                }
            });
        }

        // ELEMENTOS UI COMPLEMENTARIOS (Toasts y escapado de código)
        function createToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `px-4 py-2.5 rounded-xl border shadow-2xl text-xs font-mono font-medium pointer-events-auto transition-all duration-300 transform translate-y-2 opacity-0 bg-[#1a1a1a] ${type === 'success' ? 'border-emerald-500 text-emerald-400' : type === 'info' ? 'border-blue-500 text-blue-400' : 'border-red-500 text-red-400'}`;
            toast.textContent = `[SYS LOG]: ${message}`;
            container.appendChild(toast);
            
            setTimeout(() => { toast.classList.remove('opacity-0', 'translate-y-2'); }, 50);
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-2');
                setTimeout(() => toast.remove(), 300);
            }, 3500);
        }

        function escapeHtml(text) {
            return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function b64EncodeUnicode(str) {
            return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, function(match, p1) {
                return String.fromCharCode('0x' + p1);
            }));
        }

        window.testJiraConnection = async function() {
            createToast('Iniciando handshake de validación con Atlassian...', 'info');
            const ctx = await extractExternalJiraContext();
            if(ctx) createToast('Enlace establecido. Datos de Jira mapeados.', 'success');
            else createToast('Handshake fallido. Revisa las credenciales de Jira.', 'error');
        };
    </script>
</body>
</html>
